<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiaoGuYo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f8f8f8;color:#333}
.page{display:none;width:100vw;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#4263eb,#722ed1);padding:20px}
#login{display:flex}
.box{background:#fff;padding:40px 30px;border-radius:12px;width:100%;max-width:420px}
.box h2{text-align:center;margin-bottom:30px}
.form-item{margin-bottom:20px}
.form-item label{display:block;margin-bottom:8px}
.form-item input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px}
.captcha-row{display:flex;gap:10px}
#captcha-img{width:100px;height:44px;background:#f5f9fa;border:1px solid #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.row{display:flex;align-items:center;margin-bottom:15px}
.btn{width:100%;padding:12px;background:#4263eb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
.link{text-align:center;margin-top:15px}
.link a{color:#4263eb;cursor:pointer}

#main{display:none;width:100%;min-height:100vh;background:#fff}
.pages{display:flex;align-items:center;justify-content:center;padding:20px;height:100vh}
.container{width:100%;max-width:1200px}
.row.home{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:40px}
.left,.right{flex:1;min-width:300px;display:flex;flex-direction:column;align-items:center}
.img-responsive{width:100%;max-width:450px;height:600px;object-fit:cover;border-radius:12px}
.logo img{width:110px;height:110px;border-radius:50%}
.logo h4{font-size:24px;margin-top:10px}
.home-description{margin:15px 0 30px}
.btn-group-vertical{display:flex;flex-direction:column;gap:14px}
.btn-rabbit{background:#fff;border:2px solid #333;padding:14px 32px;border-radius:50px;cursor:pointer;min-width:180px;text-align:center}

.top-bar{position:fixed;top:20px;right:30px;display:flex;gap:10px}
.top-bar button{background:rgba(0,0,0,0.2);color:#fff;border:1px solid #fff;padding:8px 16px;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div id="login" class="page">
  <div class="box">
    <h2>登录</h2>
    <div class="form-item">
      <label>账号</label>
      <input type="text" id="user" placeholder="账号">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="password" id="pwd" placeholder="密码">
    </div>
    <div class="form-item">
      <label>验证码</label>
      <div class="captcha-row">
        <input type="text" id="code" placeholder="验证码">
        <div id="captcha-img" onclick="refreshCode()"></div>
      </div>
    </div>
    <div class="row">
      <input type="checkbox" id="remember" checked>
      <label for="remember">记住密码</label>
    </div>
    <button class="btn" onclick="doLogin()">登录</button>
    <div class="link">
      <a onclick="showFind()">找回密码</a> |
      <a onclick="showReg()">注册</a>
    </div>
  </div>
</div>

<div id="register" class="page">
  <div class="box">
    <h2>注册</h2>
    <div class="form-item"><label>账号</label><input type="text" id="reg_user"></div>
    <div class="form-item"><label>密码</label><input type="password" id="reg_pwd"></div>
    <button class="btn" onclick="alert('注册成功');showLogin()">注册</button>
    <div class="link"><a onclick="showLogin()">返回登录</a></div>
  </div>
</div>

<div id="findPwd" class="page">
  <div class="box">
    <h2>找回密码</h2>
    <div class="form-item"><label>账号</label><input type="text"></div>
    <button class="btn" onclick="alert('联系QQ：78190368');showLogin()">提交</button>
    <div class="link"><a onclick="showLogin()">返回登录</a></div>
  </div>
</div>

<div id="main">
  <div class="top-bar">
    <button onclick="alert('设置开发中')">设置</button>
    <button onclick="logout()">退出</button>
  </div>
  <div class="pages">
    <div class="container">
      <div class="row home">
        <div class="left">
          <img class="img-responsive" src="https://picsum.photos/id/1042/800/600">
        </div>
        <div class="right">
          <div class="logo">
            <img src="https://picsum.photos/id/64/200/200">
            <h4>XiaoGuYo</h4>
          </div>
          <p class="home-description">热爱生活，记录美好</p>
          <div class="btn-group-vertical">
            <div class="btn-rabbit" onclick="showPage('about')">关于</div>
            <div class="btn-rabbit" onclick="showPage('work')">经历</div>
            <div class="btn-rabbit" onclick="showPage('space')">空间</div>
            <div class="btn-rabbit" onclick="showPage('contact')">联系</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="about" style="display:none;text-align:center;padding:50px">
    <h1>关于我</h1><p>我是XiaoGuYo</p>
    <button class="btn" style="width:200px;margin-top:20px" onclick="showMain()">返回</button>
  </div>
  <div id="work" style="display:none;text-align:center;padding:50px">
    <h1>我的经历</h1><p>正在努力成长</p>
    <button class="btn" style="width:200px;margin-top:20px" onclick="showMain()">返回</button>
  </div>
  <div id="space" style="display:none;text-align:center;padding:50px">
    <h1>空间</h1><p>功能开发中</p>
    <button class="btn" style="width:200px;margin-top:20px" onclick="showMain()">返回</button>
  </div>
  <div id="contact" style="display:none;text-align:center;padding:50px">
    <h1>联系我</h1><p>QQ：78190368</p>
    <button class="btn" style="width:200px;margin-top:20px" onclick="showMain()">返回</button>
  </div>
</div>

<script>
let code = "";
function refreshCode(){
  code = Math.random().toString(36).slice(2,6).toUpperCase();
  document.getElementById("captcha-img").innerText = code;
}

function showLogin(){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById("login").style.display="flex";
}
function showReg(){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById("register").style.display="flex";
}
function showFind(){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById("findPwd").style.display="flex";
}

function showMain(){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById("main").style.display="block";
  document.querySelectorAll("#about,#work,#space,#contact").forEach(e=>e.style.display="none");
}
function showPage(id){
  document.querySelectorAll("#about,#work,#space,#contact").forEach(e=>e.style.display="none");
  document.getElementById(id).style.display="block";
}

function doLogin(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pwd").value;
  const c = document.getElementById("code").value.toUpperCase();
  if(!u||!p||!c){alert("请填写完整");return}
  if(c!==code){alert("验证码错误");return}
  if(u!=="78190368" || p!=="mawei1@."){alert("账号或密码错误");return}
  localStorage.setItem("logined","1");
  showMain();
}

function logout(){
  localStorage.clear();
  location.reload();
}

window.onload = function(){
  refreshCode();
  if(localStorage.getItem("logined")==="1"){
    showMain();
  }
}
</script>
</body>
</html>
