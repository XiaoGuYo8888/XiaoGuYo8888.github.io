<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaoGuYo</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        body{background:#f8f8f8;color:#333;line-height:1.6}
        .page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4263eb,#722ed1);padding:20px}
        .box{background:#fff;padding:40px 30px;border-radius:12px;width:100%;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
        .box h2{text-align:center;margin-bottom:30px;color:#333}
        .form-item{margin-bottom:20px}
        .form-item label{display:block;margin-bottom:8px;font-size:14px}
        .form-item input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:6px;font-size:15px}
        .captcha-row{display:flex;gap:10px}
        .captcha-row input{flex:1}
        #captcha-img{width:100px;height:44px;background:#f5f9fa;border:1px solid #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer}
        .row{display:flex;align-items:center;margin-bottom:15px;font-size:14px}
        .btn{width:100%;padding:12px;background:#4263eb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        .link{text-align:center;margin-top:15px;font-size:13px;color:#666}
        .link a{color:#4263eb;cursor:pointer}

        #register,#findPwd,#main,#settingsPage,#spacePage,#about,#work,#contact{display:none}

        .setting-item{padding:15px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
        .avatar-preview{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #4263eb}

        #main{width:100%;min-height:100vh;background:#fff}
        .pages{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{width:100%;max-width:1200px}
        .row.home{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:40px}
        .left,.right{flex:1;min-width:300px;display:flex;flex-direction:column;align-items:center}
        .img-responsive{width:100%;max-width:450px;height:600px;object-fit:cover;border-radius:12px}
        .logo img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid #eee;margin-bottom:10px}
        .logo h4{font-size:24px}
        .home-description{text-align:center;margin:15px 0 30px;font-size:16px;color:#666}
        .btn-group-vertical{display:flex;flex-direction:column;gap:14px}
        .btn-rabbit{background:#fff;border:2px solid #333;padding:14px 32px;border-radius:50px;font-size:16px;cursor:pointer;min-width:180px;text-align:center}
        .btn-rabbit:hover{background:#333;color:#fff}

        .space-box{max-width:800px}
        .space-toolbar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .space-toolbar button{padding:8px 14px;border-radius:6px;border:none;cursor-pointer}
        .btn-primary{background:#4263eb;color:#fff}
        .btn-danger{background:#f34144;color:#fff}

        .folder-grid,.file-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-bottom:20px;
        }
        .folder-item{background:#f8f9fa;border-radius:10px;padding:15px 10px;text-align:center;cursor:pointer}
        .file-item{background:#f9f9f9;border-radius:8px;padding:10px;text-align:center;cursor:pointer}
        .file-item img{width:100%;height:60px;object-fit:cover;border-radius:4px}

        .preview-modal{
            position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:9999;
            display:flex;align-items:center;justify-content:center;padding:20px;display:none
        }
        .preview-close{
            position:absolute;top:20px;right:20px;background:#fff;width:40px;height:40px;
            border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer
        }
        .preview-img{max-height:80vh}

        .top-bar{position:fixed;top:20px;right:30px;display:flex;gap:10px}
        .top-bar button{background:rgba(0,0,0,0.2);color:#fff;border:1px solid #fff;padding:8px 16px;border-radius:6px;cursor:pointer}
        footer{background:#f8f8f8;padding:30px;text-align:center;color:#888}
    </style>
</head>
<body>

<div class="preview-modal" id="previewModal">
    <div class="preview-close" onclick="closePreview()">×</div>
    <img id="previewImg" class="preview-img">
</div>

<!-- 登录 -->
<div id="login" class="page">
    <div class="box">
        <h2>登录</h2>
        <div class="form-item">
            <label>账号</label>
            <input type="text" id="user" placeholder="输入账号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="输入密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="loginCaptcha" placeholder="验证码">
                <div id="captcha-img" onclick="refreshCaptcha()"></div>
            </div>
        </div>
        <div class="row">
            <input type="checkbox" id="remember" checked>
            <label for="remember">记住我</label>
        </div>
        <button class="btn" onclick="login()">登录</button>
        <div class="link">
            <a onclick="showFindPwd()">找回密码</a> |
            <a onclick="showRegister()">注册</a>
        </div>
    </div>
</div>

<!-- 注册 -->
<div id="register" class="page">
    <div class="box">
        <h2>注册</h2>
        <div class="form-item">
            <label>账号</label>
            <input type="text" id="reg_user" placeholder="设置账号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="reg_pwd" placeholder="设置密码">
        </div>
        <button class="btn" onclick="alert('注册成功！');showLogin()">注册</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<!-- 找回密码 -->
<div id="findPwd" class="page">
    <div class="box">
        <h2>找回密码</h2>
        <div class="form-item">
            <label>账号</label>
            <input type="text" id="find_user" placeholder="输入账号">
        </div>
        <button class="btn" onclick="alert('请联系管理员！');showLogin()">提交</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<!-- 主界面 -->
<div id="main">
    <div class="top-bar">
        <button onclick="showSettings()">设置</button>
        <button onclick="logout()">退出</button>
    </div>

    <div class="pages" id="index_show">
        <div class="container">
            <div class="row home">
                <div class="left">
                    <img class="img-responsive" id="mainBg">
                </div>
                <div class="right">
                    <div class="logo">
                        <img id="logoAvatar">
                        <h4 id="logoName">XiaoGuYo</h4>
                    </div>
                    <p class="home-description" id="logoSign">热爱生活</p>
                    <div class="btn-group-vertical">
                        <div class="btn-rabbit" onclick="showAbout()">关于</div>
                        <div class="btn-rabbit" onclick="showWork()">工作</div>
                        <div class="btn-rabbit" onclick="showSpace()">空间</div>
                        <div class="btn-rabbit" onclick="showContact()">联系</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="about" class="pages" style="display:none;">
        <div class="container">
            <div style="text-align:center;">
                <h1>关于我</h1>
                <p id="aboutText" style="margin:20px 0;"></p>
                <button class="btn" style="width:200px;" onclick="showMain()">返回</button>
            </div>
        </div>
    </div>

    <div id="work" class="pages" style="display:none;">
        <div class="container">
            <div style="text-align:center;">
                <h1>我的经历</h1>
                <p id="workText" style="margin:20px 0;"></p>
                <button class="btn" style="width:200px;" onclick="showMain()">返回</button>
            </div>
        </div>
    </div>

    <div id="contact" class="pages" style="display:none;">
        <div class="container">
            <div style="text-align:center;">
                <h1>联系我</h1>
                <p style="margin:20px 0;">QQ：78190368</p>
                <button class="btn" style="width:200px;" onclick="showMain()">返回</button>
            </div>
        </div>
    </div>

    <div id="spacePage" class="page">
        <div class="box space-box">
            <h2>云端空间</h2>
            <div class="space-toolbar">
                <button class="btn-primary" onclick="createFolder()">新建文件夹</button>
                <button class="btn-primary" onclick="uploadFile()">上传文件</button>
                <button class="btn-danger" onclick="deleteItem()">删除</button>
            </div>
            <div id="folderGrid" class="folder-grid"></div>
            <div id="fileGrid" class="file-grid"></div>
            <input type="file" id="fileInput" style="display:none;">
            <button class="btn" style="margin-top:10px" onclick="showMain()">返回主页</button>
        </div>
    </div>

    <div id="settingsPage" class="page">
        <div class="box">
            <h2>设置</h2>
            <div class="setting-item">
                <span>昵称</span>
                <input type="text" id="setNick" style="width:150px">
            </div>
            <div class="setting-item">
                <span>签名</span>
                <input type="text" id="setSign" style="width:150px">
            </div>
            <button class="btn" onclick="saveSettings()">保存到云端</button>
            <button class="btn" style="background:#666;margin-top:10px" onclick="showMain()">返回</button>
        </div>
    </div>

    <footer>© 2026 XiaoGuYo</footer>
</div>

<script>
const API = "https://api.js123.cc/xdaima";
const UID = "XiaoGuYo8888";
let code = "";
let folders = [];
let files = [];

// 验证码
function refreshCaptcha(){
    code = Math.random().toString(36).slice(2,6).toUpperCase();
    document.getElementById("captcha-img").innerText = code;
}

// 页面切换
function hideAll(){
    document.querySelectorAll(".page,.pages").forEach(p=>p.style.display="none");
}
function showLogin(){hideAll();document.getElementById("login").style.display="flex";}
function showRegister(){hideAll();document.getElementById("register").style.display="flex";}
function showFindPwd(){hideAll();document.getElementById("findPwd").style.display="flex";}
function showMain(){hideAll();document.getElementById("main").style.display="block";document.getElementById("index_show").style.display="flex";}
function showSettings(){hideAll();document.getElementById("settingsPage").style.display="flex";}
function showSpace(){hideAll();document.getElementById("spacePage").style.display="flex";refreshSpace();}
function showAbout(){hideAll();document.getElementById("about").style.display="flex";loadAbout();}
function showWork(){hideAll();document.getElementById("work").style.display="flex";loadWork();}
function showContact(){hideAll();document.getElementById("contact").style.display="flex";}

// 登录
async function login(){
    const u = document.getElementById("user").value;
    const p = document.getElementById("pwd").value;
    const c = document.getElementById("loginCaptcha").value.toUpperCase();
    if(!u||!p||!c)return alert("请填写完整");
    if(c!==code)return alert("验证码错误");
    if(u!=="78190368" || p!=="mawei1@.")return alert("账号或密码错误");

    localStorage.setItem("login","ok");
    await refreshData();
    showMain();
}

function logout(){
    localStorage.clear();
    location.reload();
}

// 云端
async function get(key){
    const res = await fetch(API+"?act=get&uid="+UID+"&key="+key);
    const d = await res.json();
    return d.data || "";
}
async function set(key,val){
    await fetch(API+"?act=set&uid="+UID+"&key="+key+"&val="+encodeURIComponent(val));
}

async function refreshData(){
    const nick = await get("nick") || "XiaoGuYo";
    const sign = await get("sign") || "热爱生活";
    document.getElementById("logoName").innerText = nick;
    document.getElementById("logoSign").innerText = sign;
    document.getElementById("setNick").value = nick;
    document.getElementById("setSign").value = sign;
}

async function saveSettings(){
    await set("nick",document.getElementById("setNick").value);
    await set("sign",document.getElementById("setSign").value);
    alert("保存成功");
    refreshData();
    showMain();
}

async function loadAbout(){
    document.getElementById("aboutText").innerText = await get("about") || "我是XiaoGuYo，热爱生活";
}
async function loadWork(){
    document.getElementById("workText").innerText = await get("work") || "专注学习，认真生活";
}

// 空间
async function refreshSpace(){
    folders = JSON.parse(await get("folders")||"[]");
    files = JSON.parse(await get("files")||"[]");
    const fg = document.getElementById("folderGrid");
    const fi = document.getElementById("fileGrid");
    fg.innerHTML = fi.innerHTML = "";
    folders.forEach(f=>{
        const div = document.createElement("div");
        div.className = "folder-item";
        div.innerText = "📁 "+f.name;
        fg.appendChild(div);
    });
    files.forEach(f=>{
        const div = document.createElement("div");
        div.className = "file-item";
        div.innerHTML = `<img src="${f.url}"><br>${f.name}`;
        div.onclick = ()=>{
            document.getElementById("previewImg").src = f.url;
            document.getElementById("previewModal").style.display = "flex";
        };
        fi.appendChild(div);
    });
}

function closePreview(){
    document.getElementById("previewModal").style.display = "none";
}

function createFolder(){
    const name = prompt("文件夹名");
    if(!name)return;
    folders.push({id:Date.now(),name});
    set("folders",JSON.stringify(folders));
    refreshSpace();
}

function uploadFile(){
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").onchange = async e=>{
    const file = e.target.files[0];
    if(!file)return;
    const form = new FormData();
    form.append("file",file);
    const res = await fetch("https://api.js123.cc/upload",{method:"POST",body:form});
    const d = await res.json();
    if(d.url){
        files.push({id:Date.now(),name:file.name,url:d.url});
        await set("files",JSON.stringify(files));
        refreshSpace();
    }
};

function deleteItem(){
    if(!confirm("确定删除？"))return;
    files.pop();
    set("files",JSON.stringify(files));
    refreshSpace();
}

window.onload = function(){
    refreshCaptcha();
    if(localStorage.getItem("login")==="ok"){
        refreshData().then(()=>showMain());
    }else{
        showLogin();
    }
};
</script>
</body>
</html>
