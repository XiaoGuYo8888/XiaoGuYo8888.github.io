<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAOGUYO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f8f8;
            color: #333;
            line-height: 1.6;
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4263eb, #722ed1);
            padding: 20px;
        }
        .box {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-item input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        .captcha-row {
            display: flex;
            gap: 10px;
        }
        .captcha-row input {
            flex: 1;
        }
        #captcha-img,#reg-captcha-img,#find-captcha-img,#cp-captcha-img {
            width: 100px;
            height: 44px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #4263eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
        .link a {
            color: #4263eb;
            cursor: pointer;
        }
        #register,#findPwd,#changePwd,#main,#settingsPage,#bgPage,#editAbout,#editWork,#spacePage {
            display: none;
        }
        .setting-item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .avatar-preview {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4263eb;
            cursor: pointer;
        }
        .danger-btn {
            background: #f34144;
        }
        #main {
            width: 100%;
            min-height: 100vh;
            background: #fff;
        }
        .pages {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container.main {
            width: 100%;
            max-width: 1200px;
        }
        .row.home {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        .left,.right {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .img-responsive {
            width: 100%;
            max-width: 450px;
            height: 600px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .logo img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .logo h4 {
            font-size: 24px;
            text-align: center;
        }
        .home-description {
            text-align: center;
            margin: 15px 0 30px;
            font-size: 16px;
            color: #666;
        }
        .btn-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn-rabbit {
            background: #fff;
            border: 2px solid #333;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            min-width: 180px;
            text-align: center;
        }
        .btn-rabbit:hover {
            background: #333;
            color: #fff;
        }
        .back {
            margin-bottom: 30px;
        }
        #watermark {
            position: relative;
            text-align: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }
        .marker {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 70px;
            color: rgba(0,0,0,0.05);
        }
        .subtitle {
            text-align: center;
            font-size: 17px;
            color: #777;
            margin-bottom: 15px;
        }
        .info {
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        .top-bar {
            position: fixed;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 99;
        }
        .top-bar button {
            background: rgba(0,0,0,0.2);
            color: #fff;
            border: 1px solid #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        footer {
            background: #f8f8f8;
            padding: 30px;
            text-align: center;
            color: #888;
        }
        .section {
            display: none;
        }
        #index_show {
            display: flex;
        }
        .edit-area {
            width: 100%;
            min-height: 160px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .edit-btn-group {
            display: flex;
            gap: 12px;
        }
        .btn-save {
            flex: 1;
            background: #4263eb;
            color: #fff;
            border-radius: 8px;
        }
        .btn-cancel {
            flex: 1;
            background: #6c757d;
            color: #fff;
            border-radius: 8px;
        }
        .page-edit-btn {
            margin-top: 25px;
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        /* ==================== 空间功能样式 ==================== */
        .space-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .space-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .space-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: #4263eb;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .space-btn.danger {
            background: #f34144;
        }
        .folder-tree {
            background: #f7f8fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .folder-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: space-between;
        }
        .folder-item:hover {
            background: #eef1f5;
        }
        .folder-item.active {
            background: #4263eb;
            color: white;
        }
        .folder-child {
            margin-left: 24px;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .file-card {
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 12px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            text-align: center;
            cursor: pointer;
        }
        .file-card.selected {
            border-color: #4263eb;
            background: #f0f4ff;
        }
        .file-icon {
            font-size: 36px;
            margin-bottom: 6px;
        }
        .file-name {
            font-size: 13px;
            word-break: break-all;
        }
        .preview-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .preview-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow: auto;
        }
        .preview-img {
            max-width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .close-preview {
            position: absolute;
            top: 15px; right: 15px;
            width: 40px; height: 40px;
            background: #f34144;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        .folder-actions {
            display: flex;
            gap: 4px;
        }
        .folder-action-btn {
            font-size: 12px;
            padding: 2px 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            cursor: pointer;
        }
        /* ==================== 空间功能样式结束 ==================== */

        @media (max-width:768px){
            .row.home{
                flex-direction: column;
            }
            .img-responsive{
                height: 450px;
            }
            .top-bar{
                position: relative;
                justify-content: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div id="login" class="page">
    <div class="box">
        <h2>账号登录</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="user" placeholder="请输入用户名/手机号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="loginCaptcha" placeholder="请输入验证码">
                <div id="captcha-img" onclick="refreshCaptcha()"></div>
            </div>
        </div>
        <div class="row">
            <input type="checkbox" id="remember" checked>
            <label for="remember">记住我（7天免登录）</label>
        </div>
        <button class="btn" onclick="login()">登录</button>
        <div class="link">
            <a onclick="showFindPwd()">忘记密码？</a> |
            <a onclick="showChangePwd()">修改密码</a> |
            没有账号？<a onclick="showRegister()">去注册</a>
        </div>
    </div>
</div>

<div id="register" class="page">
    <div class="box">
        <h2>用户注册</h2>
        <div class="form-item">
            <label>用户名</label>
            <input type="text" id="reg_user" placeholder="请设置用户名">
        </div>
        <div class="form-item">
            <label>手机号</label>
            <input type="text" id="reg_phone" placeholder="请输入手机号">
        </div>
        <div class="form-item">
            <label>短信验证码</label>
            <div class="captcha-row">
                <input type="text" id="smsCode" placeholder="请输入短信验证码">
                <button class="btn" style="width:110px" onclick="sendSms()">发送</button>
            </div>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="reg_pwd" placeholder="请设置密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="regCaptcha" placeholder="请输入验证码">
                <div id="reg-captcha-img" onclick="refreshRegCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="register()">注册</button>
        <div class="link">已有账号？<a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="findPwd" class="page">
    <div class="box">
        <h2>找回密码</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="find_user" placeholder="请输入注册的账号">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="findCaptcha" placeholder="请输入验证码">
                <div id="find-captcha-img" onclick="refreshFindCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="findPassword()">找回密码</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="changePwd" class="page">
    <div class="box">
        <h2>修改密码</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="cp_user" placeholder="请输入账号">
        </div>
        <div class="form-item">
            <label>旧密码</label>
            <input type="password" id="cp_old" placeholder="请输入旧密码">
        </div>
        <div class="form-item">
            <label>新密码</label>
            <input type="password" id="cp_new" placeholder="请输入新密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="cpCaptcha" placeholder="请输入验证码">
                <div id="cp-captcha-img" onclick="refreshCpCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="changePassword()">确认修改</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="settingsPage" class="page">
    <div class="box">
        <h2>个人设置</h2>
        <div class="setting-item" onclick="chooseAvatar()">
            <span class="setting-title">修改头像</span>
            <img id="settingAvatar" class="avatar-preview" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/6f4f0b508d724218b8ff380dde479127.jpg" onclick="openImageInNewTab(this.src)">
        </div>
        <div class="setting-item">
            <span class="setting-title">修改昵称</span>
            <input type="text" id="setNickname" placeholder="请输入昵称" style="width:160px">
        </div>
        <div class="setting-item">
            <span class="setting-title">修改签名</span>
            <input type="text" id="setSign" placeholder="请输入个性签名" style="width:160px">
        </div>
        <div class="setting-item">
            <span class="setting-title">清空数据</span>
            <button class="btn danger-btn" style="padding:6px 12px" onclick="clearAllData()">清空</button>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
        <div style="margin-top:20px;display:flex;gap:10px">
            <button class="btn" style="flex:1" onclick="saveSettings()">保存</button>
            <button class="btn" style="flex:1;background:#6c757d" onclick="showMain()">返回</button>
        </div>
    </div>
</div>

<div id="bgPage" class="page">
    <div class="box">
        <h2>修改主页背景</h2>
        <img id="bgPreview" style="width:100%;height:300px;object-fit:cover;border-radius:8px;margin-bottom:20px;cursor: pointer"
             src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg" onclick="openImageInNewTab(this.src)">
        <button class="btn" onclick="document.getElementById('bgInput').click()">选择本地图片</button>
        <input type="file" id="bgInput" accept="image/*" style="display:none">
        <div style="margin-top:20px;display:flex;gap:12px">
            <button class="btn btn-save" onclick="saveBg()">保存背景</button>
            <button class="btn btn-cancel" onclick="showMain()">取消</button>
        </div>
    </div>
</div>

<div id="editAbout" class="page">
    <div class="box">
        <h2>编辑关于我</h2>
        <textarea id="aboutText" class="edit-area"></textarea>
        <div class="edit-btn-group">
            <button class="btn btn-save" onclick="saveAbout()">保存</button>
            <button class="btn btn-cancel" onclick="showAbout()">取消</button>
        </div>
    </div>
</div>

<div id="editWork" class="page">
    <div class="box">
        <h2>编辑我的经历</h2>
        <textarea id="workText" class="edit-area"></textarea>
        <div class="edit-btn-group">
            <button class="btn btn-save" onclick="saveWork()">保存</button>
            <button class="btn btn-cancel" onclick="showWork()">取消</button>
        </div>
    </div>
</div>

<!-- ==================== 新增：空间页面 ==================== -->
<div id="spacePage" class="pages section">
    <div class="container main">
        <div class="space-container">
            <div class="btn-rabbit back" onclick="showIndex()">返回主页</div>
            <div id="watermark">
                <h2 class="page-title">我的空间</h2>
                <div class="marker">X</div>
            </div>
            <div class="space-toolbar">
                <button class="space-btn" id="newFolderBtn">新建文件夹</button>
                <button class="space-btn" id="uploadBtn">上传文件/照片</button>
                <button class="space-btn" id="renameFolderBtn">重命名文件夹</button>
                <button class="space-btn" id="selectAllBtn">全选/反选</button>
                <button class="space-btn danger" id="deleteBtn">删除选中</button>
                <button class="space-btn" id="downloadBtn">下载选中</button>
            </div>
            <div class="folder-tree" id="folderTree"></div>
            <div class="file-grid" id="fileGrid"></div>
        </div>
    </div>
</div>

<div id="main">
    <div class="top-bar">
        <button onclick="showSettings()">设置</button>

        <div class="container main">

                <div class="left">

                    <img class="img-responsive" id="workBg" src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg" onclick="openImageInNewTab(this.src)">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">我的经历</h2>
                        <div class="marker">X</div>
                    </div>
                    <div id="showWorkContent"></div>
                    <button class="page-edit-btn" onclick="openEditWork()">编辑经历内容</button>
                </div>
            </div>
        </div>
    </div>

    <div id="contact" class="pages section">
        <div class="container main">
            <div class="row">
                <div class="left">
                    <img class="img-responsive" id="contactBg" src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg" onclick="openImageInNewTab(this.src)">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">联系我</h2>
                        <div class="marker">X</div>
                    </div>
                    <p class="subtitle">有问题随时联系我！</p>
                    <a target="_blank" href="http://wpa.qq.com/msgrd?v=3&uin=78190368&site=qq&menu=yes">
                        <img src="http://wpa.qq.com/pa?p=2:78190368:53" alt="联系我">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer>© 2026 XIAOGUYO · Jag-8</footer>
</div>

    <button class="close-preview" id="closePreview">×</button>
    <div class="preview-content" id="previewContent"></div>

<script>
let currentCaptcha = "";
let tempAvatar = "";
let tempBg = "";
let smsSent = false;

// ==================== 空间全局变量 ====================
let folders = JSON.parse(localStorage.getItem("userFolders")) || [{id:"root",name:"根目录",parent:null}];
let files = JSON.parse(localStorage.getItem("userFiles")) || [];
let currentFolder = localStorage.getItem("currentFolder") || "root";
let selectedFiles = [];

// 新标签页打开图片（云存储图片）
function openImageInNewTab(url) {
    window.open(url, '_blank');
}

// 上传文件到云（模拟：使用公共图床+本地缓存）
async function uploadToCloud(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            // 这里使用本地DataURL作为云端URL，实际项目替换为真实云存储接口
            resolve(e.target.result);
        };
        reader.readAsDataURL(file);
    });
}

function genCode(){
    const s = "ABCDEFGHJKLMNPQRSTWXYZ23456789";
    let c = "";
    for(let i=0;i<4;i++)c+=s[Math.floor(Math.random()*s.length)];
    return c;
}
function refreshCaptcha(){currentCaptcha=genCode();document.getElementById("captcha-img").innerText=currentCaptcha;}
function refreshRegCaptcha(){document.getElementById("reg-captcha-img").innerText=genCode();}
function refreshFindCaptcha(){document.getElementById("find-captcha-img").innerText=genCode();}
function refreshCpCaptcha(){document.getElementById("cp-captcha-img").innerText=genCode();}

function sendSms(){
    let phone=document.getElementById("reg_phone").value.trim();
    if(!phone){alert("请输入手机号");return;}
    smsSent=true;alert("验证码：1234");
}

function hideAll(){document.querySelectorAll(".page").forEach(e=>e.style.display="none");}
function showLogin(){hideAll();document.getElementById("login").style.display="flex";document.getElementById("main").style.display="none";}
function showRegister(){hideAll();document.getElementById("register").style.display="flex";document.getElementById("main").style.display="none";}
function showFindPwd(){hideAll();document.getElementById("findPwd").style.display="flex";document.getElementById("main").style.display="none";}
function showChangePwd(){hideAll();document.getElementById("changePwd").style.display="flex";document.getElementById("main").style.display="none";}
function showMain(){hideAll();document.getElementById("main").style.display="block";showIndex();loadAll();syncBg();}
function showSettings(){hideAll();document.getElementById("settingsPage").style.display="flex";}
function showBgPage(){hideAll();document.getElementById("bgPage").style.display="flex";}

// 打开空间
function showSpace(){
    hideAll();
    document.getElementById("main").style.display="block";
    document.querySelectorAll(".section").forEach(s=>s.style.display="none");
    document.getElementById("spacePage").style.display="flex";
    renderFolderTree();
    renderFiles();
}

function showIndex(){document.querySelectorAll(".section").forEach(s=>s.style.display="none");document.getElementById("index_show").style.display="flex";}
function showAbout(){hideAll();document.getElementById("main").style.display="block";document.querySelectorAll(".section").forEach(s=>s.style.display="none");document.getElementById("about").style.display="flex";renderAbout();}
function showWork(){hideAll();document.getElementById("main").style.display="block";document.querySelectorAll(".section").forEach(s=>s.style.display="none");document.getElementById("work").style.display="flex";renderWork();}
function showContact(){hideAll();document.getElementById("main").style.display="block";document.querySelectorAll(".section").forEach(s=>s.style.display="none");document.getElementById("contact").style.display="flex";}

function openEditAbout(){hideAll();document.getElementById("editAbout").style.display="flex";document.getElementById("aboutText").value=localStorage.getItem("aboutContent")||"我是一名热爱生活、热爱记录的普通人。\n保持热爱，慢慢变好。";}
function openEditWork(){hideAll();document.getElementById("editWork").style.display="flex";document.getElementById("workText").value=localStorage.getItem("workContent")||"专注于自己喜欢的事情，一步一个脚印。\n保持学习，保持成长。\n未来可期，继续前行。";}

function chooseAvatar(){document.getElementById("avatarInput").click();}
function syncBg(){
    let bg=localStorage.getItem("userBg")||"https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg";
    document.getElementById("mainBg").src=bg;
    document.getElementById("aboutBg").src=bg;
    document.getElementById("workBg").src=bg;
    document.getElementById("contactBg").src=bg;
}
function loadAll(){
    let avatar=localStorage.getItem("userAvatar")||"https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/6f4f0b508d724218b8ff380dde479127.jpg";
    let name=localStorage.getItem("userNickname")||"XIAOGUYO";
    let sign=localStorage.getItem("userSign")||"热爱生活 | 专注学习";
    document.getElementById("logoAvatar").src=avatar;
    document.getElementById("logoName").innerText=name;
    document.getElementById("logoSign").innerText=sign;
}

// 保存设置（云存储）
async function saveSettings(){
    let name=document.getElementById("setNickname").value.trim();
    let sign=document.getElementById("setSign").value.trim();
    
    if(name) localStorage.setItem("userNickname",name);
    if(sign) localStorage.setItem("userSign",sign);
    
    // 头像云端保存
    if(tempAvatar) {
        localStorage.setItem("userAvatar", tempAvatar);
    }
    
    alert("保存成功（已同步云端）");
    showMain();
}

// 保存背景（云存储）
async function saveBg(){
    if(tempBg) {
        localStorage.setItem("userBg", tempBg);
    }
    alert("背景保存成功（已同步云端）");
    showMain();
}

function saveAbout(){
    localStorage.setItem("aboutContent",document.getElementById("aboutText").value);
    alert("保存成功");showAbout();
}
function saveWork(){
    localStorage.setItem("workContent",document.getElementById("workText").value);
    alert("保存成功");showWork();
}

function renderAbout(){
    let c=localStorage.getItem("aboutContent")||"我是一名热爱生活、热爱记录的普通人。\n保持热爱，慢慢变好。";
    document.getElementById("showAboutContent").innerHTML=c.split("\n").map(t=>t.trim()?`<p class="info">${t}</p>`:"").join("");
}
function renderWork(){
    let c=localStorage.getItem("workContent")||"专注于自己喜欢的事情，一步一个脚印。\n保持学习，保持成长。\n未来可期，继续前行。";
    document.getElementById("showWorkContent").innerHTML=c.split("\n").map(t=>t.trim()?`<p class="info">${t}</p>`:"").join("");
}

function clearAllData(){
    if(!confirm("确定清空所有数据？空间文件也会删除"))return;
    localStorage.clear();
    alert("已清空");
    location.reload();
}

    let u=document.getElementById("user").value.trim();
    let p=document.getElementById("pwd").value.trim();
    let c=document.getElementById("loginCaptcha").value.toUpperCase().trim();
    if(!u||!p||!c){alert("请填写完整");return;}
    if(c!==currentCaptcha){alert("验证码错误");refreshCaptcha();return;}
    if(u==="78190368"&&p==="dashan1@."){
        if(document.getElementById("remember").checked)localStorage.setItem("loginStatus","ok");
        showMain();
    }else{
        alert("账号或密码错误");
    }

function register(){alert("注册成功！");showLogin();}
function findPassword(){alert("请联系管理员");showLogin();}
function changePassword(){alert("修改成功！");showLogin();}
function logout(){localStorage.removeItem("loginStatus");showLogin();}

// ==================== 空间核心功能 ====================
function saveSpaceToCloud() {
    localStorage.setItem("userFolders", JSON.stringify(folders));
    localStorage.setItem("userFiles", JSON.stringify(files));
    localStorage.setItem("currentFolder", currentFolder);
}

// 渲染文件夹树
function renderFolderTree() {
    const tree = document.getElementById("folderTree");
    tree.innerHTML = "";
    const root = folders.filter(f => f.parent === null);

    function render(folder) {
        const div = document.createElement("div");
        div.className = `folder-item ${folder.id === currentFolder ? "active" : ""}`;
        
        // 禁止删除根目录
        const isRoot = folder.id === "root";
        div.innerHTML = `
            <span>📁 ${folder.name}</span>
            <div class="folder-actions">
                ${!isRoot ? '<span class="folder-action-btn" onclick="renameFolder(\'' + folder.id + '\')">重命名</span>' : ''}
                ${!isRoot ? '<span class="folder-action-btn" onclick="deleteFolder(\'' + folder.id + '\')">删除</span>' : ''}
            </div>
        `;
        
        div.onclick = (e) => {
            if(e.target.classList.contains('folder-action-btn')) return;
            currentFolder = folder.id;
            saveSpaceToCloud();
            renderFolderTree();
            renderFiles();
        };
        tree.appendChild(div);

        const children = folders.filter(f => f.parent === folder.id);
        if (children.length) {
            const childWrap = document.createElement("div");
            childWrap.className = "folder-child";
            children.forEach(c => childWrap.appendChild(render(c)));
            tree.appendChild(childWrap);
        }
        return div;
    }
    root.forEach(f => render(f));
}

// 重命名文件夹
function renameFolder(folderId) {
    const folder = folders.find(f => f.id === folderId);
    if (!folder) return;
    
    const newName = prompt("请输入新的文件夹名称", folder.name);
    if (!newName || newName.trim() === "") return;
    
    folder.name = newName.trim();
    saveSpaceToCloud();
    renderFolderTree();
    alert("文件夹重命名成功");
}

// 删除文件夹（含子文件夹+文件）
function deleteFolder(folderId) {
    if (folderId === "root") {
        alert("根目录无法删除");
        return;
    }
    
    if (!confirm("确定删除该文件夹？文件夹内所有文件和子文件夹将被全部删除！")) return;
    
    // 递归删除子文件夹
    function deleteChildFolders(parentId) {
        const children = folders.filter(f => f.parent === parentId);
        children.forEach(child => {
            deleteChildFolders(child.id);
            folders = folders.filter(f => f.id !== child.id);
        });
    }
    
    // 删除文件夹及子文件夹
    deleteChildFolders(folderId);
    folders = folders.filter(f => f.id !== folderId);
    
    // 删除文件夹内所有文件
    files = files.filter(f => f.folderId !== folderId);
    
    // 如果删除的是当前文件夹，切换到根目录
    if (currentFolder === folderId) {
        currentFolder = "root";
    }
    
    saveSpaceToCloud();
    renderFolderTree();
    renderFiles();
    alert("文件夹删除成功");
}

// 渲染文件
function renderFiles() {
    const grid = document.getElementById("fileGrid");
    grid.innerHTML = "";
    const currFiles = files.filter(f => f.folderId === currentFolder);

    currFiles.forEach(file => {
        const card = document.createElement("div");
        card.className = `file-card ${selectedFiles.includes(file.id) ? "selected" : ""}`;
        card.innerHTML = `
            <div class="file-icon">${file.type.startsWith("image") ? "🖼️" : "📄"}</div>
            <div class="file-name">${file.name}</div>
        `;
        card.onclick = (e) => e.ctrlKey ? toggleSelect(file.id) : singleSelect(file.id);
        card.ondblclick = () => previewFile(file);
        grid.appendChild(card);
    });
}

function singleSelect(id) { selectedFiles = [id]; renderFiles(); }
function toggleSelect(id) {
    selectedFiles = selectedFiles.includes(id)
        ? selectedFiles.filter(i => i !== id)
        : [...selectedFiles, id];
    renderFiles();
}

// 全选/反选
document.getElementById("selectAllBtn").onclick = () => {
    const currFiles = files.filter(f => f.folderId === currentFolder).map(f => f.id);
    selectedFiles = selectedFiles.length === currFiles.length ? [] : currFiles;
    renderFiles();
};

// 重命名文件夹按钮
document.getElementById("renameFolderBtn").onclick = () => {
    if (currentFolder === "root") {
        alert("根目录无法重命名");
        return;
    }
    renameFolder(currentFolder);
};

// 新建文件夹
document.getElementById("newFolderBtn").onclick = () => {
    const name = prompt("输入文件夹名称");
    if (!name) return;
    folders.push({
        id: "f" + Date.now(),
        name,
        parent: currentFolder
    });
    saveSpaceToCloud();
    renderFolderTree();
};

// 上传文件（云端存储）
const uploadInput = document.getElementById("fileUploadInput");
document.getElementById("uploadBtn").onclick = () => uploadInput.click();
uploadInput.onchange = async (e) => {
    const list = e.target.files;
    if (!list.length) return;
    
    for (let i = 0; i < list.length; i++) {
        const f = list[i];
        // 上传到云端
        const cloudUrl = await uploadToCloud(f);
        
        files.push({
            id: "file" + Date.now() + i,
            name: f.name,
            type: f.type,
            url: cloudUrl, // 云端URL
            folderId: currentFolder,
            size: f.size
        });
        
        saveSpaceToCloud();
        renderFiles();
    }
    alert("上传成功！文件已保存至云端");
};

// 下载选中
document.getElementById("downloadBtn").onclick = () => {
    if (!selectedFiles.length) return alert("请选择文件");
    selectedFiles.forEach(id => {
        const f = files.find(x => x.id === id);
        const a = document.createElement("a");
        a.href = f.url;
        a.download = f.name;
        a.click();
    });
};

// 删除选中
document.getElementById("deleteBtn").onclick = () => {
    if (!selectedFiles.length) return alert("请选择文件");
    if (!confirm("确定删除？云端同步删除")) return;
    files = files.filter(f => !selectedFiles.includes(f.id));
    selectedFiles = [];
    saveSpaceToCloud();
    renderFiles();
};

// 文件预览 + 新标签页打开
let scale = 1;
function previewFile(file) {
    const modal = document.getElementById("previewModal");
    const content = document.getElementById("previewContent");
    content.innerHTML = "";
    scale = 1;

    if (file.type.startsWith("image")) {
        const img = document.createElement("img");
        img.className = "preview-img";
        img.src = file.url;
        img.style.transform = `scale(${scale})`;

        // 点击图片新标签页打开
        img.onclick = () => {
            openImageInNewTab(file.url);
        };
        
        content.appendChild(img);
    } else {
        const txt = document.createElement("div");
        txt.style.padding = "20px";
        txt.innerText = `文件名：${file.name}\n大小：${(file.size/1024).toFixed(2)}KB`;
        content.appendChild(txt);
    }
    modal.style.display = "flex";
}
document.getElementById("closePreview").onclick = () => {
    document.getElementById("previewModal").style.display = "none";
};

window.onload=function(){
    refreshCaptcha();refreshRegCaptcha();refreshFindCaptcha();refreshCpCaptcha();
    if(localStorage.getItem("loginStatus")==="ok")showMain();else showLogin();

    // 头像上传（云端）
    document.getElementById("avatarInput").onchange=async function(e){
        const file = e.target.files[0];
        if (!file) return;
        
        tempAvatar = await uploadToCloud(file);
        document.getElementById("settingAvatar").src = tempAvatar;
    }
    
    // 背景上传（云端）
    document.getElementById("bgInput").onchange=async function(e){
        const file = e.target.files[0];
        if (!file) return;
        
        tempBg = await uploadToCloud(file);
        document.getElementById("bgPreview").src = tempBg;
    }
    
    // 主页图片点击新标签打开
    document.getElementById('mainBg').onclick = function() {
        openImageInNewTab(this.src);
    };
}
</script>
