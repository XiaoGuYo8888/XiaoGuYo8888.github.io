<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaoGuYo</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        body{background:#f8f8f8;color:#333;line-height:1.6}
        .page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4263eb,#722ed1);padding:20px}
        .box{background:#fff;padding:40px 30px;border-radius:12px;width:100%;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
        .box h2{text-align:center;margin-bottom:30px;color:#333}
        .form-item{margin-bottom:20px}
        .form-item label{display:block;margin-bottom:8px;font-size:14px}
        .form-item input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:6px;font-size:15px}
        .captcha-row{display:flex;gap:10px}
        .captcha-row input{flex:1}
        #captcha-img{width:100px;height:44px;background:#f5f9fa;border:1px solid #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer}
        .row{display:flex;align-items:center;margin-bottom:15px;font-size:14px}
        .btn{width:100%;padding:12px;background:#4263eb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        .btn:disabled{background:#ccc}
        .link{text-align:center;margin-top:15px;font-size:13px;color:#666}
        .link a{color:#4263eb;cursor:pointer}

        #main,#settingsPage,#spacePage,#aboutPage,#workPage,#contactPage,#editAboutPage,#editWorkPage{display:none}

        .setting-item{padding:15px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
        .avatar-preview{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #4263eb}

        #main{width:100%;min-height:100vh;background:#fff}
        .pages{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{width:100%;max-width:1200px}
        .row.home{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:40px}
        .left,.right{flex:1;min-width:300px;display:flex;flex-direction:column;align-items:center}
        .img-responsive{width:100%;max-width:450px;height:600px;object-fit:cover;border-radius:12px}
        .logo img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid #eee;margin-bottom:10px}
        .logo h4{font-size:24px}
        .home-description{text-align:center;margin:15px 0 30px;font-size:16px;color:#666}
        .btn-group-vertical{display:flex;flex-direction:column;gap:14px}
        .btn-rabbit{background:#fff;border:2px solid #333;padding:14px 32px;border-radius:50px;font-size:16px;cursor:pointer;min-width:180px;text-align:center}
        .btn-rabbit:hover{background:#333;color:#fff}
        .back{margin-bottom:30px}

        .space-box{max-width:800px}
        .space-path{font-size:14px;color:#666;margin-bottom:10px}
        .space-toolbar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .space-toolbar button{padding:8px 14px;border-radius:6px;border:none;cursor:pointer}
        .btn-primary{background:#4263eb;color:#fff}
        .btn-danger{background:#f34144;color:#fff}
        .btn-light{background:#f1f1f1;color:#333}

        .folder-grid,.file-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-bottom:20px;
        }
        .folder-item{background:#f8f9fa;border-radius:10px;padding:15px 10px;text-align:center;cursor:pointer}
        .file-item{background:#f9f9f9;border-radius:8px;padding:10px;text-align:center;cursor:pointer}
        .file-item img{width:100%;height:60px;object-fit:cover;border-radius:4px}

        .preview-modal{
            position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:9999;
            display:flex;align-items:center;justify-content:center;padding:20px;display:none
        }
        .preview-close{
            position:absolute;top:20px;right:20px;background:#fff;width:40px;height:40px;
            border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer
        }
        .preview-img{max-height:80vh;max-width:90vw}

        .top-bar{position:fixed;top:20px;right:30px;display:flex;gap:10px}
        .top-bar button{background:rgba(0,0,0,0.2);color:#fff;border:1px solid #fff;padding:8px 16px;border-radius:6px;cursor:pointer}
        footer{background:#f8f8f8;padding:30px;text-align:center;color:#888}
        .edit-area{width:100%;min-height:200px;padding:15px;border:1px solid #ddd;border-radius:8px;margin-bottom:20px}
    </style>
</head>
<body>

<div class="preview-modal" id="previewModal">
    <div class="preview-close" onclick="closePreview()">×</div>
    <img id="previewImg" class="preview-img">
</div>

<div id="login" class="page">
    <div class="box">
        <h2>登录</h2>
        <div class="form-item">
            <label>账号</label>
            <input type="text" id="user" placeholder="账号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="code" placeholder="验证码">
                <div id="captcha-img" onclick="refreshCode()"></div>
            </div>
        </div>
        <button class="btn" onclick="login()">登录</button>
    </div>
</div>

<div id="main" class="page">
    <div class="top-bar">
        <button onclick="goSettings()">设置</button>
        <button onclick="logout()">退出</button>
    </div>

    <div class="pages">
        <div class="container">
            <div class="row home">
                <div class="left">
                    <img class="img-responsive" id="bgImage">
                </div>
                <div class="right">
                    <div class="logo">
                        <img id="avatar">
                        <h4 id="nickname">XiaoGuYo</h4>
                    </div>
                    <p class="home-description" id="sign"></p>
                    <div class="btn-group-vertical">
                        <div class="btn-rabbit" onclick="goAbout()">关于</div>
                        <div class="btn-rabbit" onclick="goWork()">经历</div>
                        <div class="btn-rabbit" onclick="goSpace()">空间</div>
                        <div class="btn-rabbit" onclick="goContact()">联系</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="settingsPage" class="page">
    <div class="box">
        <h2>云端设置</h2>
        <div class="setting-item">
            <span>头像</span>
            <img id="setAvatar" class="avatar-preview">
        </div>
        <div class="setting-item">
            <span>昵称</span>
            <input type="text" id="setNick" style="width:160px">
        </div>
        <div class="setting-item">
            <span>签名</span>
            <input type="text" id="setSign" style="width:160px">
        </div>
        <button class="btn" onclick="saveSettings()">保存到云端</button>
        <button class="btn" style="background:#666;margin-top:10px" onclick="refreshData()">刷新数据</button>
        <button class="btn" style="background:#666;margin-top:10px" onclick="goMain()">返回主页</button>
    </div>
</div>

<div id="spacePage" class="page">
    <div class="box space-box">
        <h2>云端空间</h2>
        <div class="space-path" id="spacePath">首页</div>
        <div class="space-toolbar">
            <button class="btn-primary" onclick="createFolder()">新建文件夹</button>
            <button class="btn-primary" onclick="uploadFile()">上传文件</button>
            <button class="btn-danger" onclick="deleteItem()">删除</button>
            <button class="btn-light" onclick="refreshSpace()">刷新</button>
        </div>
        <div id="folderGrid" class="folder-grid"></div>
        <div id="fileGrid" class="file-grid"></div>
        <input type="file" id="fileInput" style="display:none">
        <button class="btn" style="background:#666;margin-top:10px" onclick="goMain()">返回</button>
    </div>
</div>

<div id="aboutPage" class="page">
    <div class="box">
        <h2>关于我</h2>
        <div id="aboutContent"></div>
        <button class="btn" onclick="editAbout()">编辑</button>
        <button class="btn" style="background:#666" onclick="goMain()">返回</button>
    </div>
</div>

<div id="workPage" class="page">
    <div class="box">
        <h2>我的经历</h2>
        <div id="workContent"></div>
        <button class="btn" onclick="editWork()">编辑</button>
        <button class="btn" style="background:#666" onclick="goMain()">返回</button>
    </div>
</div>

<div id="contactPage" class="page">
    <div class="box">
        <h2>联系我</h2>
        <p style="text-align:center;margin:20px 0">QQ：78190368</p>
        <button class="btn" style="background:#666" onclick="goMain()">返回</button>
    </div>
</div>

<div id="editAboutPage" class="page">
    <div class="box">
        <h2>编辑关于我</h2>
        <textarea id="aboutText" class="edit-area"></textarea>
        <button class="btn" onclick="saveAbout()">保存到云端</button>
        <button class="btn" style="background:#666" onclick="goAbout()">返回</button>
    </div>
</div>

<div id="editWorkPage" class="page">
    <div class="box">
        <h2>编辑我的经历</h2>
        <textarea id="workText" class="edit-area"></textarea>
        <button class="btn" onclick="saveWork()">保存到云端</button>
        <button class="btn" style="background:#666" onclick="goWork()">返回</button>
    </div>
</div>

<footer>© 2026 XiaoGuYo - 云端个人网站</footer>

<script>
const API = "https://api.js123.cc/xdaima";
const uid = "XiaoGuYo8888";
let code = "";
let folders = [];
let files = [];

function refreshCode(){
    code = Math.random().toString(36).slice(2,6).toUpperCase();
    document.getElementById("captcha-img").innerText = code;
}

async function login(){
    const user = document.getElementById("user").value;
    const pwd = document.getElementById("pwd").value;
    const c = document.getElementById("code").value.toUpperCase();
    if(!user||!pwd||!c)return alert("请填写完整");
    if(c!==code)return alert("验证码错误");
    if(user!=="78190368"||pwd!=="mawei1@.")return alert("账号密码错误");

    localStorage.setItem("token",uid);
    await refreshData();
    goMain();
}

function logout(){
    localStorage.clear();
    location.reload();
}

function hideAllPages() {
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
}

function goMain(){
    hideAllPages();
    document.getElementById("main").style.display = "block";
    loadData();
}

function goSettings(){
    hideAllPages();
    document.getElementById("settingsPage").style.display = "flex";
    loadSettings();
}
function goSpace(){
    hideAllPages();
    document.getElementById("spacePage").style.display = "flex";
    refreshSpace();
}
function goAbout(){
    hideAllPages();
    document.getElementById("aboutPage").style.display = "flex";
    loadAbout();
}
function goWork(){
    hideAllPages();
    document.getElementById("workPage").style.display = "flex";
    loadWork();
}
function goContact(){
    hideAllPages();
    document.getElementById("contactPage").style.display = "flex";
}
function editAbout(){
    hideAllPages();
    document.getElementById("editAboutPage").style.display = "flex";
    loadAboutText();
}
function editWork(){
    hideAllPages();
    document.getElementById("editWorkPage").style.display = "flex";
    loadWorkText();
}

async function get(k){
    const res = await fetch(API+"?act=get&uid="+uid+"&key="+k);
    const d = await res.json();
    return d.data||"";
}

async function set(k,v){
    await fetch(API+"?act=set&uid="+uid+"&key="+k+"&val="+encodeURIComponent(v));
}

async function refreshData(){
    await loadData();
    await loadSettings();
    await refreshSpace();
    await loadAbout();
    await loadWork();
}

async function loadData(){
    const avatar = await get("avatar")||"https://picsum.photos/id/64/200/200";
    const nick = await get("nick")||"XiaoGuYo";
    const sign = await get("sign")||"热爱生活";
    const bg = await get("bg")||"https://picsum.photos/id/1042/800/600";
    document.getElementById("avatar").src = avatar;
    document.getElementById("nickname").innerText = nick;
    document.getElementById("sign").innerText = sign;
    document.getElementById("bgImage").src = bg;
}

function loadSettings(){
    document.getElementById("setAvatar").src = document.getElementById("avatar").src;
    document.getElementById("setNick").value = document.getElementById("nickname").innerText;
    document.getElementById("setSign").value = document.getElementById("sign").innerText;
}

async function saveSettings(){
    const nick = document.getElementById("setNick").value;
    const sign = document.getElementById("setSign").value;
    await set("nick",nick);
    await set("sign",sign);
    alert("已保存到云端");
    refreshData();
    goMain();
}

async function loadAbout(){
    const t = await get("about")||"这个人很懒，什么都没留下~";
    document.getElementById("aboutContent").innerText = t;
}

async function loadAboutText(){
    document.getElementById("aboutText").value = await get("about");
}

async function saveAbout(){
    await set("about",document.getElementById("aboutText").value);
    alert("已保存到云端");
    goAbout();
}

async function loadWork(){
    const t = await get("work")||"暂无经历";
    document.getElementById("workContent").innerText = t;
}

async function loadWorkText(){
    document.getElementById("workText").value = await get("work");
}

async function saveWork(){
    await set("work",document.getElementById("workText").value);
    alert("已保存到云端");
    goWork();
}

async function refreshSpace(){
    const f = await get("folders");
    const s = await get("files");
    folders = f?JSON.parse(f):[];
    files = s?JSON.parse(s):[];
    renderSpace();
}

function renderSpace(){
    const fg = document.getElementById("folderGrid");
    const fi = document.getElementById("fileGrid");
    fg.innerHTML = "";
    fi.innerHTML = "";
    folders.forEach(i=>{
        const div = document.createElement("div");
        div.className = "folder-item";
        div.innerText = "📁 "+i.name;
        div.onclick = ()=>openFolder(i.id);
        fg.appendChild(div);
    });
    files.forEach(i=>{
        const div = document.createElement("div");
        div.className = "file-item";
        div.innerHTML = `<img src="${i.url}"><br>${i.name}`;
        div.onclick = ()=>openPreview(i.url);
        fi.appendChild(div);
    });
}

function openPreview(u){
    document.getElementById("previewImg").src = u;
    document.getElementById("previewModal").style.display = "flex";
}

function closePreview(){
    document.getElementById("previewModal").style.display = "none";
}

function createFolder(){
    const n = prompt("文件夹名");
    if(!n)return;
    folders.push({id:Date.now(),name:n});
    set("folders",JSON.stringify(folders));
    refreshSpace();
}

function uploadFile(){
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").onchange = async e=>{
    const file = e.target.files[0];
    if(!file)return;
    const form = new FormData();
    form.append("file",file);
    const res = await fetch("https://api.js123.cc/upload",{method:"POST",body:form});
    const d = await res.json();
    if(d.url){
        files.push({id:Date.now(),name:file.name,url:d.url});
        await set("files",JSON.stringify(files));
        refreshSpace();
    }
};

function deleteItem(){
    if(!confirm("确定删除？"))return;
    files.pop();
    set("files",JSON.stringify(files));
    refreshSpace();
}

window.onload = ()=>{
    refreshCode();
    if(localStorage.getItem("token")===uid){
        refreshData().then(() => goMain());
    } else {
        hideAllPages();
        document.getElementById("login").style.display = "flex";
    }
};
</script>
</body>
</html>
