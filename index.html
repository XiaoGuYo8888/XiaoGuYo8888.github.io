<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAOGUYO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f8f8;
            color: #333;
            line-height: 1.6;
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4263eb, #722ed1);
            padding: 20px;
        }
        .box {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-item input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        .captcha-row {
            display: flex;
            gap: 10px;
        }
        .captcha-row input {
            flex: 1;
        }
        #captcha-img,#reg-captcha-img,#find-captcha-img,#cp-captcha-img {
            width: 100px;
            height: 44px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #4263eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }
        .link a {
            color: #4263eb;
            cursor: pointer;
        }
        #register,#findPwd,#changePwd,#main,#settingsPage,#bgPage,#editAbout,#editWork,#spacePage {
            display: none;
        }
        .setting-item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .avatar-preview {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4263eb;
        }
        .danger-btn {
            background: #f34144;
        }
        #main {
            width: 100%;
            min-height: 100vh;
            background: #fff;
        }
        .pages {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container.main {
            width: 100%;
            max-width: 1200px;
        }
        .row.home {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        .left,.right {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .img-responsive {
            width: 100%;
            max-width: 450px;
            height: 600px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .logo img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
            margin-bottom: 10px;
        }
        .logo h4 {
            font-size: 24px;
            text-align: center;
        }
        .home-description {
            text-align: center;
            margin: 15px 0 30px;
            font-size: 16px;
            color: #666;
        }
        .btn-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn-rabbit {
            background: #fff;
            border: 2px solid #333;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            min-width: 180px;
            text-align: center;
        }
        .btn-rabbit:hover {
            background: #333;
            color: #fff;
        }
        .back {
            margin-bottom: 30px;
        }
        #watermark {
            position: relative;
            text-align: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }
        .marker {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 70px;
            color: rgba(0,0,0,0.05);
        }
        .subtitle {
            text-align: center;
            font-size: 17px;
            color: #777;
            margin-bottom: 15px;
        }
        .info {
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        .top-bar {
            position: fixed;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 99;
        }
        .top-bar button {
            background: rgba(0,0,0,0.2);
            color: #fff;
            border: 1px solid #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        footer {
            background: #f8f8f8;
            padding: 30px;
            text-align: center;
            color: #888;
        }
        .section {
            display: none;
        }
        #index_show {
            display: flex;
        }
        .edit-area {
            width: 100%;
            min-height: 160px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .edit-btn-group {
            display: flex;
            gap: 12px;
        }
        .btn-save {
            flex: 1;
            background: #4263eb;
            color: #fff;
            border-radius: 8px;
        }
        .btn-cancel {
            flex: 1;
            background: #6c757d;
            color: #fff;
            border-radius: 8px;
        }
        .page-edit-btn {
            margin-top: 25px;
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        /* 空间功能样式 */
        .space-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .space-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .space-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: #4263eb;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .space-btn.danger {
            background: #f34144;
        }
        .folder-path {
            background: #f7f8fa;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .path-item {
            padding: 4px 8px;
            background: #eef1f5;
            border-radius: 4px;
            cursor: pointer;
        }
        .path-item:hover {
            background: #4263eb;
            color: white;
        }
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .folder-card {
            border: 2px solid #eef1f5;
            border-radius: 10px;
            padding: 12px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .folder-card:hover {
            border-color: #4263eb;
            background: #f0f4ff;
        }
        .folder-icon {
            font-size: 36px;
            margin-bottom: 6px;
        }
        .folder-name {
            font-size: 13px;
            word-break: break-all;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .file-card {
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 8px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            text-align: center;
            cursor: pointer;
        }
        .file-card.selected {
            border-color: #4263eb;
            background: #f0f4ff;
        }
        .file-thumb {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 6px;
        }
        .file-name {
            font-size: 13px;
            word-break: break-all;
        }
        .preview-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .preview-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow: auto;
        }
        .preview-img {
            max-width: 100%;
            max-height: 80vh;
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .preview-video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
        }
        .close-preview {
            position: absolute;
            top: 15px; right: 15px;
            width: 40px; height: 40px;
            background: #f34144;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin: 4px 0 10px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background: #4263eb;
            width: 0%;
            transition: width 0.2s;
        }
        .move-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }
        .move-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .move-folder {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px 0;
        }
        .move-folder:hover {
            background: #eef1f5;
        }
        .move-active {
            background: #4263eb;
            color: white;
        }

        @media (max-width:768px){
            .row.home{
                flex-direction: column;
            }
            .img-responsive{
                height: 450px;
            }
            .top-bar{
                position: relative;
                justify-content: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div id="login" class="page">
    <div class="box">
        <h2>账号登录</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="user" placeholder="请输入用户名/手机号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="loginCaptcha" placeholder="请输入验证码">
                <div id="captcha-img" onclick="refreshCaptcha()"></div>
            </div>
        </div>
        <div class="row">
            <input type="checkbox" id="remember" checked>
            <label for="remember">记住我（7天免登录）</label>
        </div>
        <button class="btn" onclick="login()">登录</button>
        <div class="link">
            <a onclick="showFindPwd()">忘记密码？</a> |
            <a onclick="showChangePwd()">修改密码</a> |
            没有账号？<a onclick="showRegister()">去注册</a>
        </div>
    </div>
</div>

<div id="register" class="page">
    <div class="box">
        <h2>用户注册</h2>
        <div class="form-item">
            <label>用户名</label>
            <input type="text" id="reg_user" placeholder="请设置用户名">
        </div>
        <div class="form-item">
            <label>手机号</label>
            <input type="text" id="reg_phone" placeholder="请输入手机号">
        </div>
        <div class="form-item">
            <label>短信验证码</label>
            <div class="captcha-row">
                <input type="text" id="smsCode" placeholder="请输入短信验证码">
                <button class="btn" style="width:110px" onclick="sendSms()">发送</button>
            </div>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="reg_pwd" placeholder="请设置密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="regCaptcha" placeholder="请输入验证码">
                <div id="reg-captcha-img" onclick="refreshRegCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="register()">注册</button>
        <div class="link">已有账号？<a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="findPwd" class="page">
    <div class="box">
        <h2>找回密码</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="find_user" placeholder="请输入注册的账号">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="findCaptcha" placeholder="请输入验证码">
                <div id="find-captcha-img" onclick="refreshFindCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="findPassword()">找回密码</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="changePwd" class="page">
    <div class="box">
        <h2>修改密码</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="cp_user" placeholder="请输入账号">
        </div>
        <div class="form-item">
            <label>旧密码</label>
            <input type="password" id="cp_old" placeholder="请输入旧密码">
        </div>
        <div class="form-item">
            <label>新密码</label>
            <input type="password" id="cp_new" placeholder="请输入新密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="cpCaptcha" placeholder="请输入验证码">
                <div id="cp-captcha-img" onclick="refreshCpCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="changePassword()">确认修改</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="settingsPage" class="page">
    <div class="box">
        <h2>个人设置</h2>
        <div class="setting-item" onclick="chooseAvatar()">
            <span class="setting-title">修改头像</span>
            <img id="settingAvatar" class="avatar-preview" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/6f4f0b508d724218b8ff380dde479127.jpg">
        </div>
        <div class="setting-item">
            <span class="setting-title">修改昵称</span>
            <input type="text" id="setNickname" placeholder="请输入昵称" style="width:160px">
        </div>
        <div class="setting-item">
            <span class="setting-title">修改签名</span>
            <input type="text" id="setSign" placeholder="请输入个性签名" style="width:160px">
        </div>
        <div class="setting-item">
            <span class="setting-title">清空数据</span>
            <button class="btn danger-btn" style="padding:6px 12px" onclick="clearAllData()">清空</button>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
        <div style="margin-top:20px;display:flex;gap:10px">
            <button class="btn" style="flex:1" onclick="saveSettings()">保存</button>
            <button class="btn" style="flex:1;background:#6c757d" onclick="showMain()">返回</button>
        </div>
    </div>
</div>

<div id="bgPage" class="page">
    <div class="box">
        <h2>修改主页背景</h2>
        <img id="bgPreview" style="width:100%;height:300px;object-fit:cover;border-radius:8px;margin-bottom:20px"
             src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg">
        <button class="btn" onclick="document.getElementById('bgInput').click()">选择本地图片</button>
        <input type="file" id="bgInput" accept="image/*" style="display:none">
        <div style="margin-top:20px;display:flex;gap:12px">
            <button class="btn btn-save" onclick="saveBg()">保存背景</button>
            <button class="btn btn-cancel" onclick="showMain()">取消</button>
        </div>
    </div>
</div>

<div id="editAbout" class="page">
    <div class="box">
        <h2>编辑关于我</h2>
        <textarea id="aboutText" class="edit-area"></textarea>
        <div class="edit-btn-group">
            <button class="btn btn-save" onclick="saveAbout()">保存</button>
            <button class="btn btn-cancel" onclick="showAbout()">取消</button>
        </div>
    </div>
</div>

<div id="editWork" class="page">
    <div class="box">
        <h2>编辑我的经历</h2>
        <textarea id="workText" class="edit-area"></textarea>
        <div class="edit-btn-group">
            <button class="btn btn-save" onclick="saveWork()">保存</button>
            <button class="btn btn-cancel" onclick="showWork()">取消</button>
        </div>
    </div>
</div>

<!-- 空间页面 -->
<div id="spacePage" class="pages section">
    <div class="container main">
        <div class="btn-rabbit back" onclick="showIndex()">返回主页</div>
        <div id="watermark">
            <h2 class="page-title">我的空间</h2>
            <div class="marker">X</div>
        </div>
        <div class="space-toolbar">
            <button class="space-btn" id="newFolderBtn">新建文件夹</button>
            <button class="space-btn" id="renameBtn">重命名</button>
            <button class="space-btn" id="moveBtn">移动到</button>
            <button class="space-btn" id="uploadBtn">上传文件/照片</button>
            <button class="space-btn" id="selectAllBtn">全选/反选</button>
            <button class="space-btn danger" id="deleteBtn">删除选中</button>
            <button class="space-btn" id="downloadBtn">下载选中</button>
        </div>
        <div class="progress-bar"><div class="progress" id="uploadProgress"></div></div>
        <div class="folder-path" id="folderPath"></div>
        <div class="folder-grid" id="folderGrid"></div>
        <div class="file-grid" id="fileGrid"></div>
    </div>
</div>

<div id="main">
    <div class="top-bar">
        <button onclick="showSettings()">设置</button>
        <button onclick="logout()">退出登录</button>
    </div>

    <div id="index_show" class="pages section">
        <div class="container main">
            <div class="row home">
                <div class="left">
                    <img class="img-responsive" id="mainBg" src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg" onclick="showBgPage()">
                </div>
                <div class="right">
                    <div class="logo">
                        <img id="logoAvatar" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/6f4f0b508d724218b8ff380dde479127.jpg">
                        <h4 id="logoName">XIAOGUYO</h4>
                    </div>
                    <p class="home-description" id="logoSign">热爱生活 | 专注学习</p>
                    <div class="btn-group-vertical">
                        <div class="btn-rabbit" onclick="showAbout()">关于</div>
                        <div class="btn-rabbit" onclick="showWork()">工作</div>
                        <div class="btn-rabbit" onclick="showSpace()">空间</div>
                        <div class="btn-rabbit" onclick="showContact()">联系</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="about" class="pages section">
        <div class="container main">
            <div class="row">
                <div class="left">
                    <img class="img-responsive" id="aboutBg" src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">关于我</h2>
                        <div class="marker">X</div>
                    </div>
                    <p class="subtitle">XIAOGUYO - Jag-8 · 简单生活，认真热爱</p>
                    <div id="showAboutContent"></div>
                    <button class="page-edit-btn" onclick="openEditAbout()">编辑关于内容</button>
                </div>
            </div>
        </div>
    </div>

    <div id="work" class="pages section">
        <div class="container main">
            <div class="row">
                <div class="left">
                    <img class="img-responsive" id="workBg" src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/bf5efc911434a158a6cb3a9aaf14967.jpg">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">我的经历</h2>
                        <div class="marker">X</div>

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("userData")) db.createObjectStore("userData",{keyPath:"key"});
            if(!db.objectStoreNames.contains("folders")) db.createObjectStore("folders",{keyPath:"id"});
            if(!db.objectStoreNames.contains("files")) db.createObjectStore("files",{keyPath:"id"});
        };
        req.onsuccess = e => {db=e.target.result;resolve(db);};
        req.onerror = e=>reject(e.target.error);
    });
}
function saveData(store, data){
    return new Promise((r,j)=>{
        const t = db.transaction(store,"readwrite");
        const req = t.objectStore(store).put(data);
        req.onsuccess=()=>r();req.onerror=e=>j(e.error);
    });
}
function getData(store, key){
    return new Promise((r,j)=>{
        const t=db.transaction(store,"readonly");
        const req=key?t.objectStore(store).get(key):t.objectStore(store).getAll();
        req.onsuccess=()=>r(req.result);req.onerror=e=>j(e.error);
    });
}
function deleteData(store, key){
    return new Promise((r,j)=>{
        const t=db.transaction(store,"readwrite");
        const req=t.objectStore(store).delete(key);
        req.onsuccess=()=>r();req.onerror=e=>j(e.error);
    });
}

const uploadIn=document.getElementById("fileUploadInput");
const progress=document.getElementById("uploadProgress");
document.getElementById("uploadBtn").onclick=()=>uploadIn.click();
uploadIn.onchange=async e=>{
    const list=e.target.files;if(!list.length)return;
    let total=list.length;let count=0;
    for(const f of list){
        const reader=new FileReader();
        reader.onload=async ev=>{
            let thumb=ev.target.result;
            if(f.type.startsWith("video/")){
                const v=document.createElement("video");v.src=thumb;
                v.currentTime=1;v.muted=true;
                await new Promise(r=>{v.onloadeddata=()=>{
                    const c=document.createElement("canvas");c.width=320;c.height=180;
                    c.getContext("2d").drawImage(v,0,0,320,180);
                    thumb=c.toDataURL("image/jpeg");r();
                };});
            }
            const file={
                id:"fi_"+Date.now(),name:f.name,type:f.type,
                url:ev.target.result,thumb:thumb,
                folderId:currentFolderId,size:f.size,time:Date.now()
            };
            await saveData("files",file);files.push(file);
            count++;progress.style.width=(count/total*100)+"%";
            if(count===total){renderFiles();alert("上传完成");progress.style.width="0%";}
        };
        reader.readAsDataURL(f);
    }
};
