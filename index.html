<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaoGuYo</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        body{background:#f8f8f8;color:#333;line-height:1.6}
        .page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4263eb,#722ed1);padding:20px}
        .box{background:#fff;padding:40px 30px;border-radius:12px;width:100%;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
        .box h2{text-align:center;margin-bottom:30px;color:#333}
        .form-item{margin-bottom:20px}
        .form-item label{display:block;margin-bottom:8px;font-size:14px}
        .form-item input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:6px;font-size:15px}
        .captcha-row{display:flex;gap:10px}
        .captcha-row input{flex:1}
        #captcha-img,#reg-captcha-img,#find-captcha-img,#cp-captcha-img{width:100px;height:44px;background:#f5f9fa;border:1px solid #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;letter-spacing:2px}
        .row{display:flex;align-items:center;margin-bottom:15px;font-size:14px}
        .btn{width:100%;padding:12px;background:#4263eb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-bottom:10px}
        .btn:disabled{background:#ccc;cursor:not-allowed}
        .link{text-align:center;margin-top:15px;font-size:13px;color:#666}
        .link a{color:#4263eb;cursor:pointer}
        #register,#findPwd,#changePwd,#main,#settingsPage,#bgPage,#editAbout,#editWork,#spacePage{display:none}
        .setting-item{padding:15px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
        .avatar-preview{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #4263eb}
        .danger-btn{background:#f34144}
        #main{width:100%;min-height:100vh;background:#fff}
        .pages{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container.main{width:100%;max-width:1200px}
        .row.home{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:40px}
        .left,.right{flex:1;min-width:300px;display:flex;flex-direction:column;align-items:center}
        .img-responsive{width:100%;max-width:450px;height:600px;object-fit:cover;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
        .logo img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid #eee;margin-bottom:10px}
        .logo h4{font-size:24px;text-align:center}
        .home-description{text-align:center;margin:15px 0 30px;font-size:16px;color:#666}
        .btn-group-vertical{display:flex;flex-direction:column;gap:14px}
        .btn-rabbit{background:#fff;border:2px solid #333;padding:14px 32px;border-radius:50px;font-size:16px;cursor:pointer;min-width:180px;text-align:center}
        .btn-rabbit:hover{background:#333;color:#fff}
        .back{margin-bottom:30px}
        #watermark{position:relative;text-align:center;margin-bottom:20px}
        .page-title{font-size:32px;font-weight:bold;text-align:center}
        .marker{position:absolute;top:-25px;left:50%;transform:translateX(-50%);font-size:70px;color:rgba(0,0,0,0.05)}
        .subtitle{text-align:center;font-size:17px;color:#777;margin-bottom:15px}
        .info{text-align:center;font-size:16px;line-height:1.8;margin-bottom:10px}
        .top-bar{position:fixed;top:20px;right:30px;display:flex;gap:10px;z-index:99}
        .top-bar button{background:rgba(0,0,0,0.2);color:#fff;border:1px solid #fff;padding:8px 16px;border-radius:6px;cursor:pointer}
        footer{background:#f8f8f8;padding:30px;text-align:center;color:#888}
        .section{display:none}
        #index_show{display:flex}
        .edit-area{width:100%;min-height:160px;padding:15px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:20px;resize:vertical}
        .edit-btn-group{display:flex;gap:12px}
        .btn-save{flex:1;background:#4263eb;color:#fff;border-radius:8px}
        .btn-cancel{flex:1;background:#6c757d;color:#fff;border-radius:8px}
        .page-edit-btn{margin-top:25px;background:#6c757d;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}

        .space-box{max-width:800px}
        .space-path{font-size:14px;color:#666;margin-bottom:10px}
        .progress-info{font-size:12px;color:#333;margin-bottom:8px}
        .space-toolbar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .space-toolbar button{padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-size:14px}
        .btn-primary{background:#4263eb;color:#fff}
        .btn-danger{background:#f34144;color:#fff}
        .btn-light{background:#f1f1f1;color:#333}

        .space-content-wrapper {
            max-height:420px;overflow-y:auto;overflow-x:hidden;padding-right:4px;
        }
        .folder-grid,.file-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-bottom:20px;
        }
        .folder-item{background:#f8f9fa;border-radius:10px;padding:15px 10px;text-align:center;cursor:pointer;border:2px solid transparent;position:relative}
        .folder-item.selected{border-color:#4263eb}
        .folder-item .icon{font-size:30px;margin-bottom:8px}
        .folder-item .name{font-size:14px;word-break:break-all}
        .file-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f9f9f9;padding:6px;cursor:pointer}
        .file-item.selected{border-color:#4263eb}
        .file-item img{width:100%;height:60%;object-fit:cover;border-radius:4px}
        .file-item .file-name{font-size:12px;text-align:center;word-break:break-all;margin-top:4px}
        .file-item .file-icon{font-size:24px;margin-bottom:4px}
        .check-item{position:absolute;top:6px;left:6px;width:18px;height:18px;accent-color:#4263eb;z-index:2}

        .preview-modal{
            position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:9999;
            display:flex;align-items:center;justify-content:center;padding:20px;display:none;
        }
        .preview-close{
            position:absolute;top:20px;right:20px;background:#fff;color:#000;width:44px;height:44px;
            border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:10;
        }
        .preview-container{
            position:relative;max-width:90%;max-height:85vh;overflow:hidden;border-radius:8px;
        }
        .preview-img{
            display:block;max-width:90vw;max-height:80vh;transform-origin:center center;cursor:grab;
        }
        .preview-text{
            background:#fff;padding:20px;border-radius:8px;max-width:90%;max-height:80vh;
            overflow-y:auto;white-space:pre-wrap;font-size:14px;color:#333;
        }
        .preview-file{
            background:#fff;padding:20px 30px;border-radius:8px;font-size:16px;color:#333;
        }

        .progress-container{width:100%;height:6px;background:#eee;border-radius:3px;margin:8px 0;overflow:hidden}
        .progress-bar{height:100%;background:#4263eb;width:0%;transition:width 0.2s ease}

        @media (max-width:768px){
            .row.home{flex-direction:column;gap:20px}
            .img-responsive{height:400px;max-width:100%}
            .top-bar{position:relative;top:auto;right:auto;justify-content:center;margin:20px 0}
            .logo img{width:90px;height:90px}
            .folder-grid,.file-grid{grid-template-columns:repeat(3,1fr)}
        }
    </style>
</head>
<body>

<div class="preview-modal" id="previewModal">
    <div class="preview-close" onclick="closePreview()">×</div>
    <div id="previewBody"></div>
</div>

<div id="login" class="page">
    <div class="box">
        <h2>账号登录</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="user" placeholder="请输入用户名/手机号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="loginCaptcha" placeholder="请输入验证码">
                <div id="captcha-img" onclick="refreshCaptcha()"></div>
            </div>
        </div>
        <div class="row">
            <input type="checkbox" id="remember" checked>
            <label for="remember">记住我（7天免登录）</label>
        </div>
        <button class="btn" onclick="login()">登录</button>
        <div class="link">
            <a onclick="showFindPwd()">忘记密码？</a> |
            <a onclick="showChangePwd()">修改密码</a> |
            没有账号？<a onclick="showRegister()">去注册</a>
        </div>
    </div>
</div>

<div id="register" class="page">
    <div class="box">
        <h2>用户注册</h2>
        <div class="form-item">
            <label>用户名</label>
            <input type="text" id="reg_user" placeholder="请设置用户名">
        </div>
        <div class="form-item">
            <label>手机号</label>
            <input type="text" id="reg_phone" placeholder="请输入手机号">
        </div>
        <div class="form-item">
            <label>短信验证码</label>
            <div class="captcha-row">
                <input type="text" id="smsCode" placeholder="请输入短信验证码">
                <button class="btn" id="smsBtn" style="width:110px" onclick="sendSms()">发送</button>
            </div>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="reg_pwd" placeholder="请设置密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="regCaptcha" placeholder="请输入验证码">
                <div id="reg-captcha-img" onclick="refreshRegCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="register()">注册</button>
        <div class="link">已有账号？<a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="findPwd" class="page">
    <div class="box">
        <h2>找回密码</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="find_user" placeholder="请输入注册的账号">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="findCaptcha" placeholder="请输入验证码">
                <div id="find-captcha-img" onclick="refreshFindCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="findPassword()">找回密码</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="changePwd" class="page">
    <div class="box">
        <h2>修改密码</h2>
        <div class="form-item">
            <label>用户名/手机号</label>
            <input type="text" id="cp_user" placeholder="请输入账号">
        </div>
        <div class="form-item">
            <label>旧密码</label>
            <input type="password" id="cp_old" placeholder="请输入旧密码">
        </div>
        <div class="form-item">
            <label>新密码</label>
            <input type="password" id="cp_new" placeholder="请输入新密码">
        </div>
        <div class="form-item">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" id="cpCaptcha" placeholder="请输入验证码">
                <div id="cp-captcha-img" onclick="refreshCpCaptcha()"></div>
            </div>
        </div>
        <button class="btn" onclick="changePassword()">确认修改</button>
        <div class="link"><a onclick="showLogin()">返回登录</a></div>
    </div>
</div>

<div id="settingsPage" class="page">
    <div class="box">
        <h2>个人设置</h2>
        <div class="setting-item" onclick="chooseAvatar()">
            <span class="setting-title">修改头像</span>
            <img id="settingAvatar" class="avatar-preview" src="https://picsum.photos/id/64/100/100">
        </div>
        <div class="setting-item">
            <span class="setting-title">修改昵称</span>
            <input type="text" id="setNickname" placeholder="请输入昵称" style="width:160px">
        </div>
        <div class="setting-item">
            <span class="setting-title">修改签名</span>
            <input type="text" id="setSign" placeholder="请输入个性签名" style="width:160px">
        </div>
        <div class="setting-item">
            <span class="setting-title">清空数据</span>
            <button class="btn danger-btn" style="padding:6px 12px" onclick="clearAllData()">清空</button>
        </div>
        <input type="file" id="avatarInput" accept="*" style="display:none">
        <div style="margin-top:20px;display:flex;gap:10px">
            <button class="btn" style="flex:1" onclick="saveSettings()">保存</button>
            <button class="btn" style="flex:1;background:#6c757d" onclick="showMain()">返回</button>
        </div>
    </div>
</div>

<div id="bgPage" class="page">
    <div class="box">
        <h2>修改主页背景</h2>
        <img id="bgPreview" style="width:100%;height:300px;object-fit:cover;border-radius:8px;margin-bottom:20px"
             src="https://picsum.photos/id/1042/800/400">
        <button class="btn" onclick="document.getElementById('bgInput').click()">选择本地图片</button>
        <input type="file" id="bgInput" accept="image/*" style="display:none">
        <div style="margin-top:20px;display:flex;gap:12px">
            <button class="btn btn-save" onclick="saveBg()">保存背景</button>
            <button class="btn btn-cancel" onclick="showMain()">取消</button>
        </div>
    </div>
</div>

<div id="editAbout" class="page">
    <div class="box">
        <h2>编辑关于我</h2>
        <textarea id="aboutText" class="edit-area"></textarea>
        <div class="edit-btn-group">
            <button class="btn btn-save" onclick="saveAbout()">保存</button>
            <button class="btn btn-cancel" onclick="showAbout()">取消</button>
        </div>
    </div>
</div>

<div id="editWork" class="page">
    <div class="box">
        <h2>编辑我的经历</h2>
        <textarea id="workText" class="edit-area"></textarea>
        <div class="edit-btn-group">
            <button class="btn btn-save" onclick="saveWork()">保存</button>
            <button class="btn btn-cancel" onclick="showWork()">取消</button>
        </div>
    </div>
</div>

<div id="spacePage" class="page">
    <div class="box space-box">
        <h2>我的空间</h2>
        <div class="space-path" id="spacePath">空间首页</div>
        <div class="progress-info"><span id="progressText">就绪</span></div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="space-toolbar">
            <button class="btn-light" id="btnBack" onclick="backFolder()" style="display:none;">返回上一级</button>
            <button class="btn-primary" onclick="createFolder()">新建文件夹</button>
            <button class="btn-primary" id="btnUpload" onclick="pickFiles()" style="display:none;">上传文件</button>
            <button class="btn-primary" onclick="downloadSelected()" style="display:none;" id="btnDownload">下载选中</button>
            <button class="btn-primary" onclick="renameFolder()">重命名</button>
            <button class="btn-light" onclick="toggleSelectAll()">全选/反选</button>
            <button class="btn-danger" onclick="deleteSelected()">删除选中</button>
        </div>
        <div class="space-content-wrapper">
            <div id="folderGrid" class="folder-grid"></div>
            <div id="fileGrid" class="file-grid"></div>
        </div>
        <input type="file" id="fileInput" accept="*" multiple style="display:none;">
        <button class="btn" style="background:#6c757d;margin-top:10px" onclick="showMain()">返回主页</button>
    </div>
</div>

<div id="main">
    <div class="top-bar">
        <button onclick="showSettings()">设置</button>

    <div id="index_show" class="pages section">
        <div class="container main">
            <div class="row home">

                <div class="right">

                    <img class="img-responsive" id="aboutBg" src="https://picsum.photos/id/1042/800/600">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">关于我</h2>
                        <div class="marker">X</div>
                    </div>
                    <p class="subtitle">XiaoGuYo · 简单生活，认真热爱</p>
                    <div id="showAboutContent"></div>
                    <button class="page-edit-btn" onclick="openEditAbout()">编辑关于内容</button>

    <div id="work" class="pages section">
        <div class="container main">
            <div class="row">
                <div class="left">
                    <img class="img-responsive" id="workBg" src="https://picsum.photos/id/1042/800/600">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">我的经历</h2>
                        <div class="marker">X</div>
                    </div>
                    <div id="showWorkContent"></div>
                    <button class="page-edit-btn" onclick="openEditWork()">编辑经历内容</button>
                </div>
            </div>
        </div>
    </div>

    <div id="contact" class="pages section">
        <div class="container main">
            <div class="row">
                <div class="left">
                    <img class="img-responsive" id="contactBg" src="https://picsum.photos/id/1042/800/600">
                </div>
                <div class="right">
                    <div class="btn-rabbit back" onclick="showIndex()">返回</div>
                    <div id="watermark">
                        <h2 class="page-title">联系我</h2>
                        <div class="marker">X</div>
                    </div>
                    <p class="subtitle">有问题随时联系我！</p>
                    <a target="_blank" href="http://wpa.qq.com/msgrd?v=3&uin=78190368&site=qq&menu=yes">
                        <img src="http://wpa.qq.com/pa?p=2:78190368:53" alt="联系我">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer>© 2026 XiaoGuYo</footer>
</div>

<script>
let currentCaptcha = "";
let tempAvatar = "";
let tempBg = "";
let folders = JSON.parse(localStorage.getItem("folders") || "[]");
let files = JSON.parse(localStorage.getItem("files") || "[]");
let currentFolderId = null;
let selectedIds = [];
let pathList = [];
let folderIdCounter = Math.max(...folders.map(f => f.id || 0), 0) + 1;

let previewScale = 1;
let previewPos = {x:0,y:0};
let isDragging = false;
let start = {x:0,y:0};

function openPreview(fileId){
    const f = files.find(x => x.id === fileId);
    if(!f) return;
    previewScale = 1; previewPos = {x:0,y:0};
    const wrap = document.getElementById("previewBody");
    if(f.type.startsWith("image/")){
        wrap.innerHTML = `<div class="preview-container"><img src="${f.data}" class="preview-img" id="pImg"></div>`;
        initImgPreview();
    } else if(f.type.startsWith("text/")){
        wrap.innerHTML = `<div class="preview-text">${escapeHTML(f.data)}</div>`;
    } else {
        wrap.innerHTML = `<div class="preview-file">文件：${f.name}<br>类型：${f.type}<br>暂不支持预览</div>`;
    }
    document.getElementById("previewModal").style.display = "flex";
}

function closePreview(){
    document.getElementById("previewModal").style.display = "none";
    document.removeEventListener("mousemove", dragMove);
    document.removeEventListener("mouseup", dragEnd);
}

function initImgPreview(){
    const img = document.getElementById("pImg");
    const modal = document.getElementById("previewModal");
    img.style.transform = `translate(${previewPos.x}px,${previewPos.y}px) scale(${previewScale})`;

    modal.onwheel = e => {
        e.preventDefault();
        previewScale += e.deltaY > 0 ? -0.2 : 0.2;
        if(previewScale < 0.2) previewScale = 0.2;
        if(previewScale > 5) previewScale = 5;
        img.style.transform = `translate(${previewPos.x}px,${previewPos.y}px) scale(${previewScale})`;
    };

    img.onmousedown = e => {
        isDragging = true;
        start.x = e.clientX;
        start.y = e.clientY;
        document.addEventListener("mousemove", dragMove);
        document.addEventListener("mouseup", dragEnd);
    };

    img.ondblclick = () => {
        previewScale = 1;
        previewPos = {x:0,y:0};
        img.style.transform = `translate(0,0) scale(1)`;
    };
}

function dragMove(e){
    if(!isDragging) return;
    previewPos.x += e.clientX - start.x;
    previewPos.y += e.clientY - start.y;
    start.x = e.clientX;
    start.y = e.clientY;
    const img = document.getElementById("pImg");
    img.style.transform = `translate(${previewPos.x}px,${previewPos.y}px) scale(${previewScale})`;
}

function dragEnd(){ isDragging = false; }
function escapeHTML(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function saveSpace(){
    localStorage.setItem("folders", JSON.stringify(folders));
    localStorage.setItem("files", JSON.stringify(files));
}

function showSpace(){
    hideAll();
    document.getElementById("spacePage").style.display = "flex";
    renderSpace();
}

function createFolder(){
    const name = prompt("文件夹名称");
    if(!name) return;
    folders.push({ id: folderIdCounter++, name, parentId: currentFolderId });
    saveSpace();
    renderSpace();
}

function renameFolder(){
    if(selectedIds.length !== 1) return alert("请选择一个文件夹");
    const key = selectedIds[0];
    if(!key.startsWith("f_")) return alert("仅支持文件夹重命名");
    const id = parseInt(key.split("_")[1]);
    const f = folders.find(x => x.id === id);
    const newName = prompt("新名称", f.name);
    if(!newName) return;
    f.name = newName;
    saveSpace();
    selectedIds = [];
    renderSpace();
}

function enterFolder(id){
    const f = folders.find(x => x.id === id);
    pathList.push({ id, name: f.name });
    currentFolderId = id;
    selectedIds = [];
    renderSpace();
}

function backFolder(){
    pathList.pop();
    currentFolderId = pathList.length ? pathList.at(-1).id : null;
    selectedIds = [];
    renderSpace();
}

function toggleSelect(key){
    selectedIds.includes(key)
        ? selectedIds = selectedIds.filter(k => k !== key)
        : selectedIds.push(key);
    renderSpace();
}

function toggleSelectAll(){
    const all = [];
    folders.filter(f => f.parentId === currentFolderId).forEach(f => all.push(`f_${f.id}`));
    files.filter(f => f.fid === currentFolderId).forEach(f => all.push(`p_${f.id}`));
    selectedIds = selectedIds.length < all.length ? [...all] : [];
    renderSpace();
}

function deleteSelected(){
    if(selectedIds.length === 0) return alert("请选择内容");
    if(!confirm("确定删除？")) return;
    for(const k of selectedIds){
        if(k.startsWith("f_")) folders = folders.filter(f => f.id !== parseInt(k.split("_")[1]));
        if(k.startsWith("p_")) files = files.filter(f => f.id !== parseInt(k.split("_")[1]));
    }
    saveSpace();
    selectedIds = [];
    renderSpace();
}

function downloadSelected(){
    if(selectedIds.length === 0) return alert("请选择要下载的文件");
    let count = 0;
    selectedIds.forEach(k => {
        if(!k.startsWith("p_")) return;
        const id = parseInt(k.split("_")[1]);
        const f = files.find(x => x.id === id);
        if(!f) return;
        const a = document.createElement("a");
        a.href = f.data;
        a.download = f.name;
        a.click();
        count++;
    });
    setInfo(`已下载 ${count} 个文件`);
}

function pickFiles(){
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").onchange = function(e){
    const fileList = Array.from(e.target.files);
    const total = fileList.length;
    if(total === 0) return;
    let completed = 0;
    setInfo(`准备上传 ${total} 个文件`);
    setProgress(0);

    fileList.forEach((file, index) => {
        const reader = new FileReader();
        const start = Date.now();
        reader.onprogress = (ev) => {
            if(!ev.lengthComputable) return;
            const percent = (ev.loaded / ev.total) * 100;
            const speed = (ev.loaded / 1024 / ((Date.now() - start) / 1000)).toFixed(2);
            setInfo(`第 ${index+1}/${total} 个 | ${Math.round(percent)}% | ${speed} KB/s`);
            setProgress(((completed + percent / 100) / total) * 100);
        };
        reader.onload = (ev) => {
            files.push({
                id: Date.now() + index,
                fid: currentFolderId,
                name: file.name,
                type: file.type,
                data: ev.target.result
            });
            completed++;
            setProgress((completed / total) * 100);
            setInfo(`已完成 ${completed}/${total}`);
            if(completed === total){
                saveSpace();
                renderSpace();
                setTimeout(() => { setInfo("就绪"); setProgress(0); }, 1500);
            }
        };
        reader.readAsDataURL(file);
    });
};

function setInfo(text){
    document.getElementById("progressText").innerText = text;
}
function setProgress(p){
    document.getElementById("progressBar").style.width = Math.min(p, 100) + "%";
}

function renderSpace(){
    const fg = document.getElementById("folderGrid");
    const fi = document.getElementById("fileGrid");
    const path = document.getElementById("spacePath");
    const back = document.getElementById("btnBack");
    const up = document.getElementById("btnUpload");
    const dl = document.getElementById("btnDownload");

    fg.innerHTML = "";
    fi.innerHTML = "";
    path.innerText = "空间" + pathList.map(p => " / " + p.name).join("");
    back.style.display = pathList.length ? "inline-block" : "none";
    up.style.display = currentFolderId ? "inline-block" : "none";
    dl.style.display = currentFolderId ? "inline-block" : "none";

    folders.filter(f => f.parentId === currentFolderId).forEach(f => {
        const key = `f_${f.id}`;
        const item = document.createElement("div");
        item.className = "folder-item " + (selectedIds.includes(key) ? "selected" : "");
        item.innerHTML = `
            <input type="checkbox" class="check-item" ${selectedIds.includes(key)?"checked":""} onchange="toggleSelect('${key}')">
            <div class="icon">📁</div>
            <div class="name">${f.name}</div>
        `;
        item.ondblclick = () => enterFolder(f.id);
        fg.appendChild(item);
    });

    if(currentFolderId){
        files.filter(f => f.fid === currentFolderId).forEach(f => {
            const key = `p_${f.id}`;
            const isImg = f.type.startsWith("image/");
            const item = document.createElement("div");
            item.className = "file-item " + (selectedIds.includes(key) ? "selected" : "");
            item.innerHTML = `
                <input type="checkbox" class="check-item" ${selectedIds.includes(key)?"checked":""} onchange="toggleSelect('${key}')">
                ${isImg ? `<img src="${f.data}">` : '<div class="file-icon">📄</div>'}
                <div class="file-name">${f.name}</div>
            `;
            item.onclick = (e) => {
                if(!e.target.closest(".check-item")) openPreview(f.id);
            };
            fi.appendChild(item);
        });
    }
}

function genCode(){
    const s = "ABCDEFGHJKLMNPQRSTWXYZ23456789";
    let c = "";
    for(let i=0;i<4;i++) c += s[Math.floor(Math.random()*s.length)];
    return c;
}
